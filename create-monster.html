<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Monster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #1a0b2e;
            color: white;
            padding: 20px;
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #c4b5fd;
            font-size: 24px;
            cursor: pointer;
        }
        
        h1 {
            font-size: 24px;
            color: white;
        }
        
        .step {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        
        .step-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2d1b4e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c4b5fd;
        }
        
        .step-indicator.active {
            background: #8b5cf6;
            color: white;
        }
        
        .step-label {
            flex: 1;
        }
        
        .step-title {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .step-desc {
            color: #9ca3af;
            font-size: 14px;
        }
        
        .monster-preview {
            width: 150px;
            height: 150px;
            background-color: #8b5cf6;
            clip-path: polygon(50% 0%, 80% 20%, 100% 50%, 80% 80%, 50% 100%, 20% 80%, 0% 50%, 20% 20%);
            margin: 30px auto;
            box-shadow: 0 0 30px #8b5cf6;
            transition: all 0.3s ease;
        }
        
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        
        .option-card {
            background: #2d1b4e;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        
        .option-card:hover {
            border-color: #8b5cf6;
        }
        
        .option-card.selected {
            border-color: #8b5cf6;
            background: #3d2b5e;
        }
        
        .option-icon {
            font-size: 30px;
            margin-bottom: 8px;
        }
        
        .option-name {
            font-size: 14px;
            color: #c4b5fd;
        }
        
        .next-btn {
            width: 100%;
            background-color: #8b5cf6;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">←</button>
        <h1>Create Your Monster</h1>
    </div>

    <!-- Step 1: Name -->
    <div class="step">
        <div class="step-indicator active">1</div>
        <div class="step-label">
            <div class="step-title">Name Your Monster</div>
            <div class="step-desc">What do you call this struggle?</div>
        </div>
    </div>

    <input type="text" placeholder="e.g., Thesis Panic Monster" 
           style="width: 100%; padding: 15px; background: #2d1b4e; border: none; border-radius: 12px; color: white; margin-bottom: 30px;">

    <!-- Step 2: Features -->
    <div class="step">
        <div class="step-indicator active">2</div>
        <div class="step-label">
            <div class="step-title">Choose Features</div>
            <div class="step-desc">What does your monster look like?</div>
        </div>
    </div>

    <div class="monster-preview" id="monsterPreview"></div>

    <div class="options">
        <div class="option-card" onclick="selectFeature('teeth')">
            <div class="option-icon">🦷</div>
            <div class="option-name">Sharp Teeth</div>
        </div>
        <div class="option-card" onclick="selectFeature('eyes')">
            <div class="option-icon">👁️</div>
            <div class="option-name">Many Eyes</div>
        </div>
        <div class="option-card" onclick="selectFeature('fog')">
            <div class="option-icon">🌫️</div>
            <div class="option-name">Fog Aura</div>
        </div>
        <div class="option-card" onclick="selectFeature('chains')">
            <div class="option-icon">⛓️</div>
            <div class="option-name">Heavy Chains</div>
        </div>
    </div>

    <button class="next-btn" onclick="window.location.href='battle.html'">Create Monster & Fight →</button>

    <script>
        function selectFeature(feature) {
            alert('Feature selected: ' + feature + ' (Demo only)');
        }
    </script>
</body>
<!-- FLOATING EMERGENCY BUTTON -->
<button class="emergency-float-btn" onclick="window.location.href='emergency.html'">
    <span class="emergency-tooltip">🚨 Need Help?</span>
    🚨
</button>
</html>
