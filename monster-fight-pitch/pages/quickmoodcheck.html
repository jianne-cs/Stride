<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Mood Check - STRIDE</title>
    <link rel="stylesheet" href="../styles.css">
    <style>
        body {
            background: linear-gradient(145deg, #7dd3fc 0%, #38bdf8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 16px;
        }

        .mood-card {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(12, 74, 110, 0.35);
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            text-align: center;
        }

        h2 {
            font-size: 32px;
            color: #082032;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #334155;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .mood-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        .stress-level-label {
            font-size: 18px;
            font-weight: 600;
            color: #082032;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.5);
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
        }

        .slider-container {
            margin: 40px 0;
            position: relative;
            padding: 0 10px;
        }

        .stress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, #10b981, #f59e0b, #ef4444);
            border-radius: 10px;
            outline: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border: 3px solid #0c4a6e;
            transition: all 0.2s ease;
        }

        .stress-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            background: #f0f9ff;
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            color: #334155;
            font-size: 14px;
            font-weight: 600;
            padding: 0 5px;
        }

        .slider-label {
            background: rgba(255,255,255,0.5);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .dot-preview {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.3);
            border-radius: 50px;
        }

        .preview-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #cbd5e1;
            transition: all 0.3s ease;
        }

        .preview-dot.filled {
            background: #0c4a6e;
            box-shadow: 0 0 15px #0c4a6e;
            transform: scale(1.2);
        }

        .quick-tip {
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 15px;
            margin: 30px 0;
            font-style: italic;
            color: #082032;
            border-left: 4px solid #0c4a6e;
            text-align: left;
        }

        .tip-icon {
            font-size: 24px;
            margin-right: 10px;
            vertical-align: middle;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .primary-btn {
            flex: 1;
            background: #0c4a6e;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(12,74,110,0.3);
        }

        .primary-btn:hover {
            background: #082032;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(12,74,110,0.4);
        }

        .secondary-btn {
            flex: 1;
            background: rgba(255,255,255,0.7);
            color: #082032;
            border: 2px solid #0c4a6e;
            padding: 16px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .secondary-btn:hover {
            background: white;
            transform: translateY(-2px);
        }

        .back-btn {
            background: rgba(255,255,255,0.5);
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            color: #082032;
            cursor: pointer;
            margin-bottom: 30px;
            font-size: 1rem;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: white;
            transform: translateX(-5px);
        }

        @media (max-width: 480px) {
            .mood-card {
                padding: 30px 20px;
            }
            
            h2 {
                font-size: 28px;
            }
            
            .mood-emoji {
                font-size: 60px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="mood-card">
        <!-- Back button -->
        <div style="text-align: left; margin-bottom: 20px;">
            <button class="back-btn" onclick="window.location.href='home.html'">
                <span>←</span> Back
            </button>
        </div>

        <!-- Main content -->
        <h2>Quick Mood Check</h2>
        <p class="subtitle">How are you feeling right now? (5 seconds)</p>

        <!-- Dynamic emoji based on stress level -->
        <div class="mood-emoji" id="moodEmoji">😐</div>

        <!-- Stress level label -->
        <div class="stress-level-label" id="stressLabel">Moderate Stress</div>

        <!-- Custom slider -->
        <div class="slider-container">
            <input type="range" min="1" max="5" value="3" class="stress-slider" id="stressSlider">
            <div class="slider-labels">
                <span class="slider-label">Very Low</span>
                <span class="slider-label">Low</span>
                <span class="slider-label">Medium</span>
                <span class="slider-label">High</span>
                <span class="slider-label">Very High</span>
            </div>
        </div>

        <!-- Dot preview (matches stress indicator) -->
        <div class="dot-preview" id="dotPreview">
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
        </div>

        <!-- Quick tip based on stress level -->
        <div class="quick-tip" id="quickTip">
            <span class="tip-icon">💡</span>
            <span>Moderate stress is normal. Try some deep breathing.</span>
        </div>

        <!-- Action buttons -->
        <div class="action-buttons">
            <button class="secondary-btn" onclick="window.location.href='home.html'">Maybe Later</button>
            <button class="primary-btn" onclick="updateStressLevel()">✓ Update & Continue</button>
        </div>

        <!-- Quick links to coping tools -->
        <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
            <span style="color: #334155; font-size: 13px;">Need help now?</span>
            <a href="quickbreathing.html" style="color: #0c4a6e; text-decoration: none; font-weight: 600;">🌬️ Breathe</a>
            <a href="quickgrounding.html" style="color: #0c4a6e; text-decoration: none; font-weight: 600;">🌍 Ground</a>
            <a href="distract.html" style="color: #0c4a6e; text-decoration: none; font-weight: 600;">🎮 Distract</a>
        </div>
    </div>

    <script>
        // Elements
        const slider = document.getElementById('stressSlider');
        const moodEmoji = document.getElementById('moodEmoji');
        const stressLabel = document.getElementById('stressLabel');
        const quickTip = document.getElementById('quickTip');
        const dots = document.querySelectorAll('.preview-dot');

        // Update UI based on slider value
        function updateMoodUI() {
            const value = parseInt(slider.value);
            
            // Update dots
            dots.forEach((dot, index) => {
                if (index < value) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });

            // Update emoji and label based on value
            switch(value) {
                case 1:
                    moodEmoji.textContent = '😊';
                    stressLabel.textContent = 'Very Low Stress';
                    quickTip.innerHTML = '<span class="tip-icon">💡</span> <span>That\'s great! What\'s going well right now?</span>';
                    break;
                case 2:
                    moodEmoji.textContent = '🙂';
                    stressLabel.textContent = 'Low Stress';
                    quickTip.innerHTML = '<span class="tip-icon">💡</span> <span>Feeling calm? Take a moment to appreciate it.</span>';
                    break;
                case 3:
                    moodEmoji.textContent = '😐';
                    stressLabel.textContent = 'Moderate Stress';
                    quickTip.innerHTML = '<span class="tip-icon">💡</span> <span>Moderate stress is normal. Try some deep breathing.</span>';
                    break;
                case 4:
                    moodEmoji.textContent = '😟';
                    stressLabel.textContent = 'High Stress';
                    quickTip.innerHTML = '<span class="tip-icon">💡</span> <span>Take a 5-minute break. Grounding exercises can help.</span>';
                    break;
                case 5:
                    moodEmoji.textContent = '😫';
                    stressLabel.textContent = 'Very High Stress';
                    quickTip.innerHTML = '<span class="tip-icon">🚨</span> <span>You\'re overwhelmed. Try the 5-4-3-2-1 grounding technique now.</span>';
                    break;
            }
        }

        // Update stress level and return to home
        function updateStressLevel() {
            const value = parseInt(slider.value);
            
            // Save to localStorage - use 'stressLevel' key (consistent with home page)
            localStorage.setItem('stressLevel', value);
            
            // Also save as 'currentStressLevel' for backward compatibility
            localStorage.setItem('currentStressLevel', value);
            
            // Show success message
            alert('✅ Mood updated! Stress level: ' + value + '/5');
            
            // Redirect to home
            window.location.href = 'home.html';
        }

        // Listen to slider changes
        slider.addEventListener('input', updateMoodUI);

        // Initialize on load
        window.onload = function() {
            // Check if there's a saved stress level
            const savedStress = localStorage.getItem('stressLevel');
            if (savedStress) {
                slider.value = savedStress;
            }
            updateMoodUI();
        };
    </script>
</body>
<!-- FLOATING EMERGENCY BUTTON -->
<button class="emergency-float-btn" onclick="window.location.href='emergency.html'">
    <span class="emergency-tooltip">🚨 Need Help?</span>
    🚨
</button>
</html>
